apiVersion: patronus/v2
family: adapter
tool: claude

# How the scanner positively IDs Claude Code at each scope.
detect:
  global: ["~/.claude/", "~/.claude.json"]
  project: [".claude/", "CLAUDE.md", ".mcp.json"]

# Per-shape on-disk layout, keyed by the artifact `type` vocabulary (skill |
# agent | command | instruction) plus the mcp/hook MERGE primitives the recipe
# engine uses. The engine maps an artifact's `type` to the matching key here.
layout:
  skill:
    global: "~/.claude/skills/{name}/SKILL.md"
    project: ".claude/skills/{name}/SKILL.md"
    nameSource: dir            # command name comes from the directory name
    frontmatter: passthrough   # SKILL.md is Claude-native — no reshaping

  agent:
    global: "~/.claude/agents/{name}.md"
    project: ".claude/agents/{name}.md"
    bodyIs: systemPrompt       # portable body becomes the agent system prompt
    required: [name, description]

  command:
    global: "~/.claude/commands/{name}.md"
    project: ".claude/commands/{name}.md"

  # MERGE primitive called by the recipe engine (not an artifact `type`).
  # Claude carries an explicit `type` field, so transports map by key template.
  mcp:
    project:
      file: ".mcp.json"
      format: json
      path: "mcpServers.{name}"
    user:
      file: "~/.claude.json"
      format: json
      path: "mcpServers.{name}"
    transports:
      stdio:
        keys: { type: "stdio", command: "{command}", args: "{args}", env: "{env}" }
      http:
        keys: { type: "http", url: "{url}", headers: "{headers}" }

  hook:
    global: { file: "~/.claude/settings.json", format: json, path: "hooks.{event}", action: merge }
    project: { file: ".claude/settings.json", format: json, path: "hooks.{event}", action: merge }
    # A hook artifact that ships a helper script has it PLACED here (CREATE), and
    # the hook command's {script} token resolves to the placed path.
    globalScriptDir: "~/.claude/hooks/"
    projectScriptDir: ".claude/hooks/"

  # A setting artifact MERGEs a scalar/object value at its own dotted path into
  # settings.json (the artifact's setting.path supplies the path; the layout only
  # names the file). Used for the ccusage statusline (statusLine key) and the
  # native-sandbox toggle (P7.5.5).
  setting:
    global: { file: "~/.claude/settings.json", format: json }
    project: { file: ".claude/settings.json", format: json }

  instruction:
    global: { file: "~/.claude/CLAUDE.md", action: appendSection }
    project: { file: "CLAUDE.md", action: appendSection }
    # appendSection inserts/replaces ONLY a fenced block keyed by {name}:
    #   <!-- patronus:start {name} --> … <!-- patronus:end {name} -->

  output-style:
    # Claude has a native output-styles surface — CREATE a standalone file (no
    # action ⇒ CREATE). Codex/OpenCode lack it, so they APPEND to AGENTS.md.
    global: { file: "~/.claude/output-styles/{name}.md" }
    project: { file: ".claude/output-styles/{name}.md" }
    frontmatter: passthrough
    required: [name, description]
