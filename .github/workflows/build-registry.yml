# build-registry — VALIDATES that the registry still builds whenever catalog
# content changes (a PR/CI check), uploading the result as a workflow artifact for
# inspection. It publishes nothing — actual publishing to R2 is publish-catalog.yml
# (on a push to main / a tag, gated by the protected `production` environment).
# Keeping validation separate means it runs safely on fork PRs (no secrets) and
# gives fast "did my new skill/recipe/profile produce a valid index.json?" feedback
# without touching the live registry.
#
# The registry is built from ALL the content the catalog is made of — artifacts,
# recipes, AND profiles — plus the build machinery itself.
name: build-registry

on:
  pull_request:
    paths:
      - "artifacts/**"
      - "recipes/**"
      - "profiles/**"
      - "adapters/**" # adapters are embedded into the registry's transform path
      - "cmd/patronus/build.go"
      - "internal/registry/**"
  push:
    branches: [main]
    paths:
      - "artifacts/**"
      - "recipes/**"
      - "profiles/**"
      - "adapters/**"
      - "cmd/patronus/build.go"
      - "internal/registry/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build registry (catalog/ tree; default base URL)
        run: go run ./cmd/patronus build --out registry/
      - name: Upload registry artifact (inspection only — not published)
        uses: actions/upload-artifact@v4
        with:
          name: registry
          path: registry/
