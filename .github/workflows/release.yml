# release — on a v* tag, cross-compiles the binary for every supported platform,
# regenerates the registry, and publishes a GitHub Release with the binaries,
# their checksums, and the registry assets (index.json + tarballs).
#
# The binaries are static (CGO_ENABLED=0) so they run on minimal Linux, native
# Windows, and macOS with zero prerequisites — the "one binary, works anywhere"
# premise. The version is stamped into the binary via -ldflags.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          out="dist/patronus-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o "$out" ./cmd/patronus
      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Collect binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: cd dist && sha256sum patronus-* > checksums.txt
      - name: Build registry
        run: go run ./cmd/patronus build --out registry/ --registry-version "${GITHUB_REF_NAME}"
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/patronus-*
            dist/checksums.txt
            registry/index.json
            registry/index.json.sha256
            registry/*.tar.gz
