# CI — runs on every push and pull request: build, vet, lint, and test the whole
# repo. This is the gate that keeps main green; the release pipeline assumes it has
# already passed.
name: ci

on:
  push:
    branches: [main]
  pull_request:

# The test job runs on EVERY pull_request, INCLUDING from forks, and `go test`
# executes repository code — a fork PR can therefore run arbitrary code here. That is
# safe today ONLY because there is nothing in this workflow to steal: `contents: read`
# and no `secrets.*` anywhere in it.
#
# DECISION (2026-07-12, docs/specs/01-lifecycle-and-test-surface/test-surface-spec.md):
# this stops being safe the instant anyone adds a secret to this workflow. If a secret
# is ever needed, EITHER move the secret-requiring step into a separate, manually
# approved workflow, OR switch that job to pull_request_target guarded by
#   if: github.event.pull_request.head.repo.full_name == github.repository
# Do not add a secret to this job.
#
# The companion rule lives in the tests: no test may fetch remote bytes (cmd/patronus's
# TestMain installs a deny-all fetcher that panics with the URL). A test that pulled
# from raw.githubusercontent.com would execute third-party bytes in this pipeline on
# every PR, before human review.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: test
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      # Lints the WHOLE repo against the curated .golangci.yml (debuggability set).
      # golangci-lint v2 is required because go.mod targets Go 1.25 (v1.x is built
      # with an older Go and refuses to analyze a newer-targeted module).
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
