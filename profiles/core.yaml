apiVersion: patronus/v2
family: profile
role: lifecycle                            # L11 — profiles are lifecycle by nature
name: core
summary: "The opinionated default environment — agent house rules + design discipline, plan/execute + diagnosis skills, design vocabulary, ASCII diagrams ON, test-first as a TAUGHT discipline (the tdd skill), secret/diff guardrails, and ccusage observability. Layer on top: `tdd-enforced` (hard test-first enforcement), `safe-git` (block destructive git), `hardened` (sandbox), `ai-memory` (ambient memory), `quiet` (no diagrams)."
# core teaches good defaults; it does not mechanically enforce them (that's what the
# opt-in overlays are for). It is NOT marked status:stub — every item listed below
# exists in-repo today and installs.
layers:
  instructions:
    - agents-spine                         # the AGENTS.md format spine
    - agent-rules                          # distilled DDD + refactoring discipline
    - diagram-explain                      # output-style — ASCII diagrams on by default (strict default)
    - branch-first                         # new work goes on a branch unless told otherwise (taught, advisory)
  capabilities:
    - skills-dispatch                      # the keystone: skill-check-before-acting discipline, across the WHOLE installed set
    - skills-dispatch-activate             # SessionStart hook — auto-injects the dispatch keystone from turn one (its activation; requires skills-dispatch)
    - skills-heartbeat@claude              # UserPromptSubmit hook — re-asserts the skill rule + lists installed skills EACH turn (fights mid-context decay); Claude-only
    - work-state-reground@claude           # SessionStart hook — on resume/compaction, reconcile with Ticket + ai-memory (externalized state); Claude-only, conditional on what's wired
    - language-detect                      # SessionStart hook — inject a pointer to the idioms the repo's language actually follows (points, never inlines)
    - writing-plans                        # plan a multi-step task before touching code
    - executing-plans                      # execute a plan task-by-task with checkpoints
    - grilling                             # interrogate a plan before building
    - diagnosing-bugs                      # disciplined diagnosis loop for hard bugs
    - tdd                                  # test-first tracer-bullet discipline (the chosen TDD skill)
    - brainstorming                        # explore intent + requirements + design BEFORE any creative work
    - using-git-worktrees                  # start feature work in an isolated workspace
    - finishing-a-development-branch       # decide how to integrate finished work (merge/PR/cleanup)
    - writing-skills                       # author/edit/verify skills (the meta-skill)
    - team-research@claude                 # spec-driven parallel research (Claude tools; codex flavour is a separate artifact)
    - team-implement@claude                # spec-driven parallel implementation (Claude tools; codex flavour is a separate artifact)
  context:
    - codebase-design                      # deep-module design vocabulary
    - domain-modeling                      # ubiquitous-language + ADR discipline
    - context7                             # live, version-specific library docs (hosted MCP)
    - serena                               # semantic code navigation of the local repo (LSP MCP)
    - pattern-cloudflare                   # in-repo context skill
    - pattern-mcp                          # in-repo context skill
  tools:
    - github                               # L5 default — GitHub issues/PRs/code search (hosted MCP)
  # No default memory recipe in core: ai-memory ships its full ambient integration
  # via the opt-in `ai-memory` profile (it needs a running daemon + its lifecycle
  # hooks fire on every action), and engram is the self-contained fallback. Add a
  # memory layer by installing the `ai-memory` profile or the `memory-engram`
  # recipe. The work-state-reground hook below stays — its ai-memory cue is
  # conditional and simply no-ops when no memory layer is wired.
  eval:
    # Test-first is TAUGHT here (the `tdd` skill above), not mechanically enforced.
    # The hard PreToolUse gate (tdd-guard recipe + tdd-guard-hook) is opt-in via the
    # `tdd-enforced` profile — it blocks every edit lacking a failing test, which is
    # too aggressive for the default (it can't tell impl code from a YAML/docs edit).
    - spec-review                          # advisory gate — closes the spec phase (4-lens rubric) before writing-plans
    - plan-review                          # advisory gate — closes the planning phase (coverage vs the spec) before implementation
    - verification-before-completion       # evidence-before-claims discipline
    - requesting-code-review               # dispatch a focused reviewer when finishing work (ships code-reviewer.md)
    - receiving-code-review                # act on review feedback with technical rigor, not performative agreement
  guardrails:
    - block-secrets                        # PreToolUse Write|Edit — blocks writing obvious secrets (best-effort; not read-leak)
    - gitleaks                             # install the gitleaks CLI (github-release, pinned) — the scanner the commit guard pipes through
    - gitleaks-guard                       # PreToolUse Bash @commit — scans the staged diff, blocks a commit carrying a secret
    # git-guardrails (blocks destructive git: push/reset --hard/clean -f/...) is NOT
    # in core — it intercepts ordinary git (incl. push), which is too opinionated for
    # the default. Opt in via the `safe-git` profile.
  observability:
    - ccusage                              # install the ccusage CLI (npm, install-only) — on-demand token-usage/cost reports
    - ccusage-statusline@claude            # Claude-only statusline setting (token usage in the status bar); @claude → no-op on codex/opencode
  orchestration:
    - ticket                               # work-graph discipline (AGENTS.md APPEND) — `requires: [tk]`, so the tk binary recipe is pulled into the install/lock closure automatically
    - session-completion                   # end-of-session discipline: file follow-ups, run the gates, commit, PUSH — tracker-agnostic, no requires edge
    - subagent-driven-development          # execute a plan task-by-task with fresh implementer+reviewer subagents
    - dispatching-parallel-agents          # fan out independent problem domains to concurrent subagents
todo:
  - "L6 sandbox: native, flavoured per agent (P7.4)."
  - "L8 eval: promptfoo CI gate (P7.5.6)."
