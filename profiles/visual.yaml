apiVersion: patronus/v2
family: profile
role: lifecycle                            # L11 — profiles are lifecycle by nature
name: visual
summary: "Visual-explanation environment: agent house rules + design discipline, ASCII diagrams on by default (diagram-explain), plus portable gstack workflow skills and a directory edit-fence (garrytan/gstack, MIT)."
# An L1 overlay that also carries a few additive L2/L9 items (ported gstack skills +
# the freeze-folder edit-fence). It still composes onto a base profile for the rest
# (Memory L3, Tools L5, etc.) rather than extending core itself — kept deliberately
# as an overlay, NOT `extends: core`.
layers:
  instructions:
    - agents-spine                         # the AGENTS.md format spine
    - agent-rules                          # distilled DDD + refactoring discipline
    - diagram-explain                      # output-style — ASCII diagrams on by default
  capabilities: []                         # filled by Task 2 (ported clean skills), Task 6 (gstack-pr-review)
  guardrails: []                           # filled by Task 3 (freeze-folder hook + skill)
