apiVersion: patronus/v1
kind: Adapter
tool: opencode

# Honors OPENCODE_CONFIG_DIR, then $XDG_CONFIG_HOME/opencode, then ~/.config/opencode.
# The scanner resolves those env overrides; markers use the canonical default.
detect:
  global: ["~/.config/opencode/"]
  project: ["opencode.json", "opencode.jsonc", ".opencode/"]

layout:
  Skill:
    global: "~/.config/opencode/skills/{name}/SKILL.md"
    project: ".opencode/skills/{name}/SKILL.md"
    nameSource: dir
    frontmatter: passthrough   # natively Claude-SKILL.md-compatible

  Agent:
    # Loader accepts agent/ AND agents/ — write singular.
    global: "~/.config/opencode/agent/{name}.md"
    project: ".opencode/agent/{name}.md"
    frontmatter: [mode, model, prompt, permission]
    bodyIs: prompt

  Command:
    # Accepts command/ AND commands/ — write singular.
    global: "~/.config/opencode/command/{name}.md"
    project: ".opencode/command/{name}.md"

  # OpenCode uses type:"local" (stdio) / type:"remote" (http) — NOT stdio/http —
  # and stdio command is an array (command:[...]), not command+args.
  Mcp:
    global: { file: "~/.config/opencode/opencode.json", format: jsonc, path: "mcp.{name}" }
    project: { file: "opencode.json", format: jsonc, path: "mcp.{name}" }
    transports:
      stdio:
        keys: { type: "local", command: "{commandArray}", environment: "{env}" }
      http:
        keys: { type: "remote", url: "{url}", headers: "{headers}" }

  Hook:
    # TODO: OpenCode hook surface — confirm before authoring hook artifacts.
    global: null
    project: null

  Instruction:
    # OpenCode reads AGENTS.md/CLAUDE.md and an `instructions: []` glob array in config.
    global: { file: "~/.config/opencode/AGENTS.md", action: appendSection }
    project: { file: "AGENTS.md", action: appendSection }
