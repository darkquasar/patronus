apiVersion: patronus/v2
family: artifact
type: hook
role: capability
name: superpowers-session-start
description: "Activates the skill-first discipline at session start — a SessionStart hook that injects the installed superpowers-bootstrap skill body as session context, so the agent checks for an applicable skill before its first response. Pairs with (and requires) the superpowers-bootstrap skill."
version: 1.0.0
entry: ""
files: [inject-superpowers.sh]
targets: [claude, codex, opencode]
defaults:
  scope: global
hook:
  event: SessionStart
  matcher: startup|clear|compact
  command: "{script}"
  script: inject-superpowers.sh
attribution:
  upstream: github.com/obra/superpowers
  license: MIT
  copyright: "Copyright (c) 2025 Jesse Vincent"
  commit: 896224c4b1879920ab573417e68fd51d2ccc9072
  note: "Adapted from hooks/session-start. The upstream reads the skill from a plugin root via CLAUDE_PLUGIN_ROOT/run-hook.cmd indirection (plugin scaffolding Patronus does not ship); this authored variant reads the skill from its installed path and injects the superpowers-bootstrap body (the skill Patronus vendors as the keystone). Same SessionStart matcher + additionalContext approach."
