apiVersion: patronus/v2
family: artifact
type: hook
role: capability
name: skills-dispatch-activate
description: "Activates the skill-first discipline at session start — a SessionStart hook that injects the installed skills-dispatch skill body as session context, so the agent checks the ENTIRE installed skill set for an applicable skill before its first response. Pairs with (and requires) the skills-dispatch skill."
version: 1.0.0
entry: ""
files: [inject-skills-dispatch.sh]
targets: [claude, codex, opencode]
defaults:
  scope: global
requires: [skills-dispatch]                # the keystone skill this hook injects — pulled into the install/lock closure
hook:
  event: SessionStart
  matcher: startup|clear|compact
  command: "{script}"
  script: inject-skills-dispatch.sh
attribution:
  upstream: github.com/obra/superpowers
  license: MIT
  copyright: "Copyright (c) 2025 Jesse Vincent"
  commit: 896224c4b1879920ab573417e68fd51d2ccc9072
  note: "Adapted from hooks/session-start. The upstream reads the skill from a plugin root via CLAUDE_PLUGIN_ROOT/run-hook.cmd indirection (plugin scaffolding Patronus does not ship); this authored variant reads the skill from its installed path and injects the skills-dispatch body (Patronus's de-branded keystone, generalized to govern the whole installed skill set). Same SessionStart matcher + additionalContext approach; the 'you have superpowers' wording is replaced with a neutral 'installed skill library' framing."
