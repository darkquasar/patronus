  commit: 896224c4b1879920ab573417e68fd51d2ccc9072
  note: "ADAPTED from the upstream `brainstorming` skill (skills/brainstorming/). Patronus re-couplings (per ADR-0001): (1) an explicit ASCII-diagram step at design-presentation points, using the diagram-explain charset — structure gets drawn, not only described; (2) a `grilling` hand-off offered after design approval and before the spec is written, the moment the design is cheapest to change; (3) a `team-research` hand-off at the scope-assessment step for genuinely UNKNOWN (not merely large) domains — decomposition splits work you understand, team-research investigates work you don't. The body otherwise follows upstream; the spec-document-reviewer-prompt.md, visual-companion.md, and scripts/ are retained VERBATIM. The scripts were AUDITED before shipping: the server binds 127.0.0.1 by default, runs under umask 077 with per-session tokens, verifies the PID before signalling on shutdown, and makes no outbound network calls — it is a local, opt-in visual aid the user explicitly approves before launch. This is Patronus's first skill that ships a background local service; it is agent-launched on demand, never at install time."
