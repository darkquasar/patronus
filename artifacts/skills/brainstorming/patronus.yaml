  note: "Vendored verbatim from the upstream `brainstorming` skill (skills/brainstorming/), including the spec-reviewer prompt, visual-companion.md, and the scripts/ visual-companion server (server.cjs + start/stop-server.sh + helper.js + frame-template.html). The scripts were AUDITED before shipping: the server binds 127.0.0.1 by default, runs under umask 077 with per-session tokens, verifies the PID before signalling on shutdown, and makes no outbound network calls — it is a local, opt-in visual aid the user explicitly approves before launch. This is Patronus's first skill that ships a background local service; it is agent-launched on demand, never at install time."
