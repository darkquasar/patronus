  note: "ADAPTED from the upstream `executing-plans` skill. References to un-vendored sibling skills (finishing-a-development-branch, using-git-worktrees, subagent-driven-development) are softened to optional notes. Patronus re-coupling (per ADR-0001): the per-task 'mark as completed' step also runs `tk close <id>` when the plan's tasks were mirrored into ticket by writing-plans — closing is what unblocks the next ready task, so a mirrored plan that is never closed stalls `tk ready`. No-ops when ticket was not used. The execution discipline is otherwise faithful."
