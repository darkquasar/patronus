apiVersion: patronus/v2
family: recipe
name: cloudflare-mcp
role: tools                        # L5 — Tools / Integrations (Cloudflare docs/platform)
summary: "Cloudflare Docs MCP (hosted) — search the live Cloudflare developer docs from the agent. Keyless. Opt-in (cloudflare profile)."
upstream: github.com/cloudflare/mcp-server-cloudflare
license: Apache-2.0

# REMOTE (http) MCP, like github: nothing to download, so NO deliver block — install
# is a single config MERGE. The docs server is keyless (no Cloudflare account auth);
# account-scoped servers (bindings/observability/etc.) need OAuth and are NOT wired
# here. Shape (computed) = wire-only.
wire:
  mode: mcp
  mcp:
    transport: http
    url: "https://docs.mcp.cloudflare.com/mcp"
  tools: [claude, codex, opencode]
