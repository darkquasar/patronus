apiVersion: patronus/v2
family: recipe
name: gitleaks
role: guardrail                            # L9 — the binary behind the commit-time secret guard
summary: "Installs the gitleaks CLI (github-release, pinned per-OS/arch + sha256) — the secret scanner the gitleaks-guard commit hook pipes the staged diff through. fetch+wire? no: install-only; the gitleaks-guard hook does the wiring."
upstream: github.com/gitleaks/gitleaks
license: MIT

# Install-only: fetch + verify the pinned binary, no wiring of its own — the
# gitleaks-guard hook artifact registers the PreToolUse commit guard that invokes
# it. Pinned to v8.30.1 (sha256 from the release checksums.txt); each archive
# holds a bare `gitleaks` binary at its root. Note the upstream uses `x64` in
# asset names where GOARCH is `amd64`.
deliver:
  source: github-release
  installTo: "~/.patronus/bin/"
  binary: gitleaks
  assets:
    - os: linux
      arch: amd64
      url: "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz"
      sha256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
      archive: tar.gz
      binaryPath: gitleaks
    - os: linux
      arch: arm64
      url: "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_arm64.tar.gz"
      sha256: "e4a487ee7ccd7d3a7f7ec08657610aa3606637dab924210b3aee62570fb4b080"
      archive: tar.gz
      binaryPath: gitleaks
    - os: darwin
      arch: amd64
      url: "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_darwin_x64.tar.gz"
      sha256: "dfe101a4db2255fc85120ac7f3d25e4342c3c20cf749f2c20a18081af1952709"
      archive: tar.gz
      binaryPath: gitleaks
    - os: darwin
      arch: arm64
      url: "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_darwin_arm64.tar.gz"
      sha256: "b40ab0ae55c505963e365f271a8d3846efbc170aa17f2607f13df610a9aeb6a5"
      archive: tar.gz
      binaryPath: gitleaks
    - os: windows
      arch: amd64
      url: "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_windows_x64.zip"
      sha256: "d29144deff3a68aa93ced33dddf84b7fdc26070add4aa0f4513094c8332afc4e"
      archive: zip
      binaryPath: gitleaks.exe
    - os: windows
      arch: arm64
      url: "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_windows_arm64.zip"
      sha256: "b95f5e4f5c425cedca7ee203d9afd29597e692c4924a12ed42f970537c72cc0f"
      archive: zip
      binaryPath: gitleaks.exe
