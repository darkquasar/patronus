apiVersion: patronus/v2
family: recipe
name: github
role: tools                        # L5 Tools / Integrations
summary: "GitHub MCP server (hosted) — issues, PRs, code search."
upstream: github.com/github/github-mcp-server
license: MIT

# REMOTE (http) MCP: nothing to download, so NO deliver block — install is a
# single config MERGE. Shape (computed) = wire-only.
wire:
  mode: mcp
  mcp:
    transport: http
    url: "https://api.githubcopilot.com/mcp/"
  tools: [claude, codex, opencode]
