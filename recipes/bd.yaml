apiVersion: patronus/v2
family: recipe
name: bd
role: orchestration                        # L10 — the git-native work-graph binary behind the `beads` instruction
summary: "Installs the bd CLI (Beads — a git-native work-graph / issue tracker for AI-supervised coding; github-release, pinned per-OS/arch + sha256). The binary the `beads` instruction tells the agent to drive (bd init/ready/create/dep/close). Install-only: deliver the binary, no wiring of its own — the `beads` instruction artifact does the wiring (an AGENTS.md APPEND)."
upstream: github.com/steveyegge/beads
license: MIT

# Install-only: fetch + verify the pinned binary, no wire of its own — the sibling
# `beads` instruction artifact (which `requires: [bd]`) APPENDs the AGENTS.md
# snippet that teaches the agent to use it. Mirrors the gitleaks recipe + guard
# split and the tdd-guard recipe + hook split: recipe delivers the binary, a
# sibling carries the wiring/prose. Pinned to v1.0.4 (sha256 from the release
# checksums.txt). Each tar.gz/zip holds a bare `bd` (`bd.exe` on Windows) at root.
deliver:
  source: github-release
  installTo: "~/.patronus/bin/"
  binary: bd
  assets:
    - os: linux
      arch: amd64
      url: "https://github.com/steveyegge/beads/releases/download/v1.0.4/beads_1.0.4_linux_amd64.tar.gz"
      sha256: "643e602e27f666c8726abff0f22001e2b5883988fa960204bde20a3129d448a5"
      archive: tar.gz
      binaryPath: bd
    - os: linux
      arch: arm64
      url: "https://github.com/steveyegge/beads/releases/download/v1.0.4/beads_1.0.4_linux_arm64.tar.gz"
      sha256: "48cdf571cd8b64bae81da829c1309e402bc12e6a4cc6b87606dfc9220b7ece60"
      archive: tar.gz
      binaryPath: bd
    - os: darwin
      arch: amd64
