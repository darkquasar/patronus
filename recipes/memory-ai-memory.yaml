apiVersion: patronus/v2
family: recipe
name: memory-ai-memory
role: memory                               # L3 — default recipe for the memory layer
summary: "Multi-agent memory layer — MCP + CLI, SQLite+FTS5+optional vectors, git-markdown source of truth."
upstream: github.com/akitaonrails/ai-memory
license: MIT

deliver:
  source: docker                           # blessed path: daemon on 127.0.0.1:49374 (multi-platform image)
  fallbacks:
    - pm: cargo                            # native binary build (Docker-free)
      ref: ai-memory
    - pm: aur
      ref: ai-memory

scope:
  marker: ".ai-memory.toml"                # per-repo isolation marker; stable-UUID project scoping
  global: "~/.local/share/ai-memory"

# ai-memory wires ITSELF into each agent — Patronus orchestrates its installers.
# mode: self → the run commands are surfaced as ADVISORY (display-only) EXEC rows:
# Patronus prints them for the user to run but does NOT execute them, because they
# invoke the `ai-memory` CLI, which this recipe does not deliver (delivery is Docker
# / opt-in cargo, not a fetched binary). Auto-running would error on any machine
# where ai-memory isn't installed. Flagged self-managing (remove reports them as
# "not auto-revertable"). Shape (computed) = fetch+run.
wire:
  mode: self
  run:
    - "ai-memory install-mcp   --client {tool} --apply"
    - "ai-memory install-hooks --agent  {tool} --apply"
  tools: [claude, codex, opencode]

# Optional durable bootstrap facts pre-loaded into the store at install (L1->L3 bridge).
seed: []

# TODO(§5c open): verify the Docker-free cargo/native path on Windows; if it fails,
# auto-fall-back to memory-engram on Windows before making this the unconditional default.
