apiVersion: patronus/v2
family: recipe
name: tk
role: orchestration                        # L10 — the git-native work-graph binary behind the `ticket` instruction
summary: "Installs the tk CLI (Ticket — a git-native work-graph / issue tracker whose DAG lives in plain markdown under .tickets/, committed like any other file; url source, pinned commit + sha256). The binary the `ticket` instruction tells the agent to drive (tk create/ready/dep/close). Install-only: deliver the script, no wiring of its own — the `ticket` instruction artifact does the wiring (an AGENTS.md APPEND)."
upstream: github.com/wedow/ticket
license: MIT

# Install-only: fetch + verify the pinned script, no wire of its own — the sibling
# `ticket` instruction artifact (which `requires: [tk]`) APPENDs the AGENTS.md
# snippet that teaches the agent to use it. Mirrors the gitleaks recipe + guard
# split: the recipe delivers the binary, a sibling carries the wiring/prose.
#
# `source: url` rather than github-release: upstream ships NO release assets — the
# tool IS the single `ticket` bash script at the repo root. So there is one pinned
# artifact for every host, not a per-OS/arch matrix.
#
# Pinned to the COMMIT, never the tag: tags are movable, and GitHub's generated
# source tarballs are not byte-stable. v0.3.2 == 266b9d38d5090f1af4e5184afd21b183b3bbe878.
#
# platforms: [linux, darwin] — tk is bash (leaning on awk/sed/date), so native
# Windows gets a clear advisory and NO fetch rather than an unusable download.
# WSL/git-bash users are unaffected (they present as linux).
deliver:
  source: url
  installTo: "~/.patronus/bin/"
  binary: tk
  url: "https://raw.githubusercontent.com/wedow/ticket/266b9d38d5090f1af4e5184afd21b183b3bbe878/ticket"
  sha256: "408f2c113ecc3bc071507593a78386f1b4cc743be6491c9e9f2627efd4d9902b"
  platforms: [linux, darwin]
